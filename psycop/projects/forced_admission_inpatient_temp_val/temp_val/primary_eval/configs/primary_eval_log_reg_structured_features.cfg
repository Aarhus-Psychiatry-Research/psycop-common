[project_info]
experiment_path = "E:/shared_resources/forced_admissions_inpatient_temp_val/model_training/temporal_validation/"

#################
# LOGGING
#################
[logger]
@loggers = "multi_logger"

[logger.*.terminal]
@loggers = "terminal_logger"

[logger.*.mlflow]
@loggers = "mlflow_logger"
experiment_name = "forced_admission_inpatient_temporal_validation"
run_name = "None"
postpone_run_creation_to_first_log = True

[logger.*.disk_logger]
@loggers = "disk_logger"
run_path = ${project_info.experiment_path}${logger.*.mlflow.experiment_name}

#################
# TRAINER
#################

[trainer]
@trainers = "crossval_trainer"
uuid_col_name = "prediction_time_uuid"
training_outcome_col_name = "outc_forced_admissions_within_180_days_maximum_fallback_0_dichotomous"
validation_outcome_col_name = "outc_forced_admissions_within_180_days_maximum_fallback_0_dichotomous"
group_col_name = "dw_ek_borger"

[trainer.metric]
@metrics = "binary_auroc"

#################
# DATA
#################
[trainer.training_data]
@data = "parquet_vertical_concatenator"
paths = ["E:/shared_resources/forced_admissions_inpatient/flattened_datasets/structured_feature_set/structured_feature_set.parquet"]
validate_on_init = False

[trainer.validation_data]
@data = "parquet_vertical_concatenator"
paths = ["E:/shared_resources/forced_admissions_inpatient_temp_val/flattened_datasets/structured_feature_set_temp_val.parquet"]
validate_on_init = False


#################
# TRAIN PIPELINE
#################
[trainer.training_preprocessing_pipeline]
@preprocessing = "baseline_preprocessing_pipeline"

[trainer.training_preprocessing_pipeline.*.split_filter]
@preprocessing = "outcomestratified_split_filter"
splits_to_keep = ["train", "val"]
id_col_name = "dw_ek_borger"

[trainer.training_preprocessing_pipeline.*.bool_to_int]
@preprocessing = "bool_to_int"

[trainer.training_preprocessing_pipeline.*.lookbehind_combination_suggester]
@preprocessing = "lookbehind_combination_col_filter"
lookbehinds = "{10,30, 180, 365}"
pred_col_prefix = "pred_"

[trainer.training_preprocessing_pipeline.*.age_filter]
@preprocessing = "age_filter"
min_age = 18
max_age = 90
age_col_name = "pred_age_in_years"

[trainer.training_preprocessing_pipeline.*.lookahead]
@preprocessing = "window_filter"
timestamp_col_name = "timestamp"
n_days = 180
direction = "ahead"

[trainer.training_preprocessing_pipeline.*.lookbehind]
@preprocessing = "window_filter"
timestamp_col_name = "timestamp"
n_days = 180
direction = "behind"

[trainer.training_preprocessing_pipeline.*.temporal_col_filter]
@preprocessing = "temporal_col_filter"

[trainer.training_preprocessing_pipeline.*.outcome_selector]
@preprocessing = "filter_columns_within_subset"
subset_rule = "outc_.+"
keep_matching = ".+180.+"

# Validate column assumptions
[trainer.training_preprocessing_pipeline.*.columns_exist]
@preprocessing = "column_exists_validator"
column_names = ["prediction_time_uuid"]

[trainer.training_preprocessing_pipeline.*.column_prefix_count_expectation]
@preprocessing = "column_prefix_count_expectation"
column_expectations = [["outc_", 1], ["prediction_timestamp", 0]]

#################
# VALIDATION PIPELINE
#################
[trainer.validation_preprocessing_pipeline]
@preprocessing = "baseline_preprocessing_pipeline"

[trainer.validation_preprocessing_pipeline.*.age_filter]
@preprocessing = "age_filter"
min_age = 18
max_age = 90
age_col_name = "pred_age_in_years"

[trainer.validation_preprocessing_pipeline.*.lookahead]
@preprocessing = "window_filter"
timestamp_col_name = "timestamp"
n_days = 180
direction = "ahead"

[trainer.validation_preprocessing_pipeline.*.lookbehind]
@preprocessing = "window_filter"
timestamp_col_name = "timestamp"
n_days = 180
direction = "behind"

[trainer.validation_preprocessing_pipeline.*.lookbehind_combination_suggester]
@preprocessing = "lookbehind_combination_col_filter"
lookbehinds = "{10, 30, 180, 365}"
pred_col_prefix = "pred_"

[trainer.validation_preprocessing_pipeline.*.temporal_col_filter]
@preprocessing = "temporal_col_filter"

[trainer.validation_preprocessing_pipeline.*.outcome_selector]
@preprocessing = "filter_columns_within_subset"
subset_rule = "outc_.+"
keep_matching = ".+180.+"

# Validate column assumptions
[trainer.validation_preprocessing_pipeline.*.columns_exist]
@preprocessing = "column_exists_validator"
column_names = ["prediction_time_uuid"]

[trainer.validation_preprocessing_pipeline.*.column_prefix_count_expectation]
@preprocessing = "column_prefix_count_expectation"
column_expectations = [["outc_", 1], ["prediction_timestamp", 0]]


#############
# Estimator #
#############
[trainer.task.task_pipe.sklearn_pipe.*.imputer]
@estimator_steps = "simple_imputation"
strategy= "most_frequent"

[trainer.task.task_pipe.sklearn_pipe.*.scaler]
@estimator_steps = "standard_scaler"


[trainer.task.task_pipe.sklearn_pipe.*.feature_selection]
@estimator_steps = "select_percentile"
score_function_name = "noop"
percentile = 61

[trainer.task.task_pipe.sklearn_pipe.*.model]
@estimator_steps = "logistic_regression"
solver= "saga"
tol= 0.0001
C = 0.013858699144874611
fit_intercept = true
max_iter = 100
l1_ratio = 0.7636447690019356


########
# Task #
########
[trainer.task]
@tasks = "binary_classification"

[trainer.task.task_pipe]
@task_pipelines = "binary_classification_pipeline"

[trainer.task.task_pipe.sklearn_pipe]
@task_pipelines = "pipe_constructor"